// ============ RENDER HELPERS ============
function badge(text,bg,color,border){
  return `<span class="badge" style="background:${bg||'#334155'};color:${color||'#94a3b8'};${border?`border:1px solid ${border}`:''}">
    ${text}</span>`;
}
function pbadges(p){
  if(p.length>=3)return badge('Cross','#a855f722','#a855f7','#a855f744');
  return p.map(x=>badge(x,PC[x]+'22',PC[x],PC[x]+'44')).join('');
}
function cbadges(ch){
  return (ch||[]).map(x=>`<span title="${CH[x].n}" style="font-size:11px;margin-right:2px">${CH[x].i}</span>`).join('');
}
function notionLink(nid,text){
  return `<a class="notion-link" href="https://app.notion.com/p/${nid}" target="_blank" rel="noreferrer">${text}</a>`;
}
function sc2col(v){return v>=4?'#f59e0b':v>=3?'#3b82f6':'#94a3b8'}

let curFilter='all';let expandedIdx=null;

function renderTab2(){
  let fl=[...V];
  if(curFilter==='det')fl=fl.filter(v=>v.d);
  else if(curFilter!=='all')fl=fl.filter(v=>v.cl===curFilter);
  fl.sort((a,b)=>{const pa=avg(a),pb=avg(b);if(pa&&pb)return pb-pa;if(pa)return-1;if(pb)return 1;return 0});

  const filterHtml=`
  <div class="filter-bar">
    <h2 style="font-size:18px;font-weight:700;color:#e2e8f0;margin:0 0 4px">Ngân hàng Video</h2>
    <p style="color:#94a3b8;font-size:11px;margin:0 0 6px">Click để xem chi tiết | Đang xem <strong style="color:#f59e0b">${fl.length}</strong>/${V.length}</p>
    <div style="display:flex;flex-wrap:wrap;gap:3px">
      <button class="filter-btn ${curFilter==='all'?'active':''}" onclick="setFilter('all')">Tất cả (${V.length})</button>
      <button class="filter-btn" style="${curFilter==='det'?'background:#f59e0b;color:#000;border-color:#f59e0b':''}" onclick="setFilter('det')">Đã phân tích (${V.filter(v=>v.d).length})</button>
      ${CL.map(c=>{const cnt=V.filter(v=>v.cl===c.id).length;const act=curFilter===c.id;
        return`<button class="filter-btn" style="${act?`background:${c.c}33;color:${c.c};border-color:${c.c}66`:''}" onclick="setFilter('${c.id}')">${c.i} ${c.id} (${cnt})</button>`}).join('')}
    </div>
  </div>`;

  const listHtml=fl.map((v,i)=>{
    const cl=CL.find(c=>c.id===v.cl);const p=avg(v);const isExp=expandedIdx===i;
    return`<div class="card-sm bordered-left" style="border-color:${cl?cl.c:'#334155'}" onclick="toggleExpand(${i})">
      <div class="flex justify-between items-center">
        <div style="flex:1;min-width:0">
          <div class="flex items-center gap-2" style="margin-bottom:3px">
            ${v.d?badge('Chi tiết','#f59e0b22','#f59e0b'):''}
            ${badge((cl?cl.i+' ':'')+v.cl+(cl?' . '+cl.n:''), (cl?cl.c:'#666')+'22', cl?cl.c:'#666')}
            ${cbadges(v.ch)}
          </div>
          <div style="font-size:12px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${v.t}</div>
          ${v.kol?`<div style="font-size:9px;color:#64748b;margin-top:1px">${v.kol}</div>`:''}
        </div>
        <div class="flex items-center" style="gap:8px;flex-shrink:0;margin-left:8px">
          ${v.l?`<div style="font-size:10px;color:#94a3b8;white-space:nowrap">L:${f(v.l)} S:${f(v.s)} Sv:${f(v.sv)}</div>`:''}
          ${p?`<div style="background:${parseFloat(p)>=3?'#f59e0b22':'#64748b22'};color:${parseFloat(p)>=3?'#f59e0b':'#64748b'};padding:3px 7px;border-radius:6px;font-size:13px;font-weight:800">${p}</div>`:''}
          <span class="chevron ${isExp?'rotated':''}">▼</span>
        </div>
      </div>
      ${isExp&&v.d?`<div class="expand-detail" onclick="event.stopPropagation()">
        <div class="grid-2" style="margin-bottom:10px">
          <div><div class="lbl">Script tóm tắt</div><div class="txt-sm">${v.ss}</div></div>
          <div><div class="lbl">Lý do Viral</div><div class="txt-sm">${v.vr}</div></div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px">
          ${['Engagement','Persona','Trigger','Viet hoa'].map((s,j)=>`<div class="score-box">
            <div style="font-size:16px;font-weight:800;color:${sc2col(v.sc[j])}">${v.sc[j]}/5</div>
            <div style="font-size:8px;color:#64748b">${s}</div>
          </div>`).join('')}
        </div>
        <div>${pbadges(v.p)}
          ${v.dy?`<a class="notion-link" href="${v.dy}" target="_blank">Douyin</a>`:''}
          ${notionLink(v.nid,'Notion (full script + viral)')}
        </div>
      </div>`:''}
      ${isExp&&!v.d?`<div class="expand-detail" onclick="event.stopPropagation()">
        <div style="font-size:11px;color:#94a3b8;font-style:italic;margin-bottom:6px">Chưa phân tích chi tiết</div>
        ${notionLink(v.nid,'Mở trong Notion')}
      </div>`:''}
    </div>`;
  }).join('');

  return filterHtml+`<div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">${listHtml}</div>`;
}

            <div class="lbl" style="margin-bottom:6px">Video mẫu + Video tương tự (${relVids.length} video)</div>
            ${t.rv?notionLink(t.rv.nid,'🎯 VIDEO MẪU: '+t.rv.t+' ('+t.rv.eg+')'):''}
            ${t.pa?`<div style="margin-top:10px;background:#0f172a;border-radius:8px;padding:12px">
              <div style="font-size:9px;color:#f59e0b;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Phân tích 5 nguyên tắc trong video mẫu trên</div>
              ${t.pa.map(pa=>`<div style="display:flex;gap:8px;margin-bottom:7px;align-items:flex-start">
                <span style="font-size:14px;flex-shrink:0">${pa.a?'✅':'❌'}</span>
                <div><span style="font-size:11px;font-weight:700;color:${pa.a?'#10b981':'#64748b'}">${pa.p}:</span> <span style="font-size:11px;color:#cbd5e1">${pa.d}</span></div>
              </div>`).join('')}
            </div>`:''}
            <div style="margin-top:8px">${relVids.filter(v=>v.nid!==t.rv?.nid).map(v=>notionLink(v.nid,v.t)).join('')}</div>
          </div>
        </div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

// ============ TAB 4: COMMENT TOPICS ============
function renderTab4(){
  return`
  <h2 style="font-size:18px;font-weight:700;color:#e2e8f0;margin:0 0 4px">Chủ đề gợi ý từ comment</h2>
  <p style="color:#94a3b8;font-size:11px;margin:0 0 12px">Câu hỏi khán giả chưa được trả lời. Phan nhom theo nhu cau.</p>
  <div class="info-box" style="margin-bottom:12px">
    <div style="font-weight:700;margin-bottom:4px">Cách tính Priority (tong 3 tieu chi, thang 3-9):</div>
    <div class="grid-3" style="font-size:10px;color:#cbd5e1">
      <div class="dark-box"><div style="color:#f59e0b;font-weight:700;margin-bottom:2px">Tần suất</div>1 video=1d | 2-3=2d | 4+=3d</div>
      <div class="dark-box"><div style="color:#f59e0b;font-weight:700;margin-bottom:2px">Gần sản phẩm</div>Không=0d | Gián tiếp=1-2d | Trực tiếp=3d</div>
      <div class="dark-box"><div style="color:#f59e0b;font-weight:700;margin-bottom:2px">Co video Douyin?</div>Không=1d | Co the=2d | Da co KW=3d</div>
    </div>
  </div>
  ${TG.map(g=>`
  <div style="margin-bottom:16px">
    <div class="flex items-center gap-2" style="margin-bottom:8px">
      <h3 style="font-size:14px;font-weight:700;color:#e2e8f0;margin:0">${g.g}</h3>
      <span style="font-size:11px;color:#94a3b8">${g.d}</span>
    </div>
    ${[...g.ts].sort((a,b)=>(b.f+b.pr+b.sc)-(a.f+a.pr+a.sc)).map(t=>{
      const score=t.f+t.pr+t.sc;const sc=score>=7?'#f59e0b':score>=5?'#3b82f6':'#94a3b8';const lb=score>=7?'Rất cao':score>=5?'Cao':'TB';
      return`<div class="card-sm bordered-left" style="border-color:${sc};margin-bottom:6px">
        <div class="flex justify-between items-center">
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:3px">${t.t}</div>
            <div style="font-size:10px;color:#94a3b8">Nguồn: ${t.src}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;margin-left:8px">
            <div class="flex items-center gap-2" style="justify-content:flex-end">
              <span style="font-size:16px;font-weight:800;color:${sc}">${score}</span>
              ${badge(lb,sc+'22',sc,sc+'44')}
            </div>
            <div style="margin-top:4px">${pbadges(t.p)}</div>
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>`).join('')}`;
}

// ============ MAIN CONTROLLER ============
let curTab=0;
const tabNames=['Tổng quan','Ngân hàng Video','Playbook','Chủ đề'];
const renderers=[renderTab1,renderTab2,renderTab3,renderTab4];

function render(){
  // Tab bar
  document.getElementById('tabBar').innerHTML=tabNames.map((n,i)=>
    `<button class="tab-btn ${curTab===i?'active':''}" onclick="setTab(${i})">${n}</button>`
  ).join('');
  // Content
  document.getElementById('content').innerHTML=renderers[curTab]();
}

function setTab(i){curTab=i;expandedIdx=null;expandedTM=null;render();}
function setFilter(f){curFilter=f;expandedIdx=null;render();}
function toggleExpand(i){expandedIdx=expandedIdx===i?null:i;render();}
function toggleTM(i){expandedTM=expandedTM===i?null:i;render();}

// Persona bar
document.getElementById('personaBar').innerHTML=Object.entries(PN).map(([k,v])=>
  `<div class="persona-dot" style="color:${PC[k]}"><div class="dot" style="background:${PC[k]}"></div>${k}: ${v}</div>`
).join('');

render();
</script>
